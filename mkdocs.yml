site_name: Aerial Robot Manual
site_description: "Development and deployment manual for the Articulated Aerial Robot (AAR) platform"
site_author: "AAR Development Team"
site_url: https://ZWT006.github.io/aerial_robot_manual/
repo_url: https://github.com/ZWT006/aerial_robot_manual
repo_name: ZWT006/aerial_robot_manual
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang:
        - en
        - ja
  - tags:
      tags_file: reference/tags.md
  - glightbox:           # Image lightbox — pip install mkdocs-glightbox
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ZWT006/aerial_robot
      name: aerial_robot on GitHub
  version:
    provider: mike          # Enable versioned docs with `mike`
    default: latest
  # Platform tags used in hardware pages
  tags:
    Dragon: robots/dragon
    Spidar: robots/spidar
    Beetle: robots/beetle

extra_css:
  - stylesheets/extra.css

